<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Foundation Revision Tracker</title>
    <style>
        /* CSS Variables for Light/Dark Mode Customisation */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
        }

        /* Night Mode Overrides */
        body.dark-mode {
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 { margin: 0; }

        button {
            cursor: pointer;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            transition: background 0.2s;
        }

        .icon-btn {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            font-size: 16px;
        }

        .search-bar {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; /* 16px prevents iOS/Android auto-zoom */
            background: var(--surface);
            color: var(--text);
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 10px;
            scrollbar-width: none; 
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 20px;
            white-space: nowrap;
            color: var(--text);
            font-size: 14px;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Form Design */
        .form-container {
            background: var(--surface);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            background: var(--bg);
            color: var(--text);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            font-size: 16px;
        }
        .btn-primary:hover { background: var(--primary-hover); }

        /* Utility Buttons Area */
        .utility-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .utility-area button {
            flex: 1;
            padding: 10px;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* Content Area & Cards */
        .tab-content { display: none; margin-top: 20px; }
        .tab-content.active { display: block; }

        .entry-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .entry-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .tag {
            background: var(--bg);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid var(--border);
        }
        .entry-img {
            max-width: 100%;
            border-radius: 6px;
            margin-top: 10px;
            display: block;
        }
        .delete-btn {
            background: var(--danger);
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h2>CA Revision Log</h2>
            <button class="icon-btn" onclick="toggleNightMode()" id="theme-toggle">🌙 Night Mode</button>
        </div>
        <input type="text" class="search-bar" id="search-input" placeholder="Search chapter, ref, or tags..." onkeyup="renderEntries()">
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('accounting')">Accounting</button>
        <button class="tab-btn" onclick="switchTab('law')">Business Laws</button>
        <button class="tab-btn" onclick="switchTab('maths')">Quant. Aptitude</button>
        <button class="tab-btn" onclick="switchTab('eco')">Economics</button>
    </div>

    <div class="form-container">
        <h3>Log a Question</h3>
        <div class="form-group">
            <label>Subject</label>
            <select id="subject-select">
                <option value="accounting">Accounting</option>
                <option value="law">Business Laws</option>
                <option value="maths">Quantitative Aptitude</option>
                <option value="eco">Business Economics</option>
            </select>
        </div>
        <div class="form-group">
            <label>Chapter Name</label>
            <input type="text" id="chapter-input" placeholder="e.g., Bank Reconciliation">
        </div>
        <div class="form-group">
            <label>Question Reference / Notes</label>
            <input type="text" id="q-ref-input" placeholder="e.g., DPP 2 - Q 6">
        </div>
        <div class="form-group">
            <label>Error Type / Tag</label>
            <select id="tag-select">
                <option value="Calculation Error">Calculation Error</option>
                <option value="Conceptual Mistake">Conceptual Mistake</option>
                <option value="Format / Presentation">Format / Presentation</option>
                <option value="Important Revision">Important Revision</option>
            </select>
        </div>
        <div class="form-group">
            <label>Upload Photo (Optional)</label>
            <input type="file" id="image-input" accept="image/*">
        </div>
        <button class="btn-primary" onclick="saveEntry()">Save to Tracker</button>
        
        <div class="utility-area">
            <button onclick="exportData()">💾 Backup Data</button>
            <button onclick="document.getElementById('import-file').click()">📂 Restore Data</button>
            <input type="file" id="import-file" style="display: none" accept=".json" onchange="importData(event)">
        </div>
    </div>

    <div id="accounting" class="tab-content active"><div id="accounting-list"></div></div>
    <div id="law" class="tab-content"><div id="law-list"></div></div>
    <div id="maths" class="tab-content"><div id="maths-list"></div></div>
    <div id="eco" class="tab-content"><div id="eco-list"></div></div>

    <script>
        // --- 1. Night Mode Setup ---
        function toggleNightMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('nightMode', isDark);
            document.getElementById('theme-toggle').innerText = isDark ? '☀️ Light Mode' : '🌙 Night Mode';
        }

        // Load theme preference on start
        if (localStorage.getItem('nightMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('theme-toggle').innerText = '☀️ Light Mode';
        }

        // --- 2. Tab Navigation ---
        let currentTab = 'accounting';
        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            document.getElementById('subject-select').value = tabId;
            renderEntries(); // Refresh list to apply search filters properly
        }

        // --- 3. Database Setup (IndexedDB) ---
        let db;
        const request = indexedDB.open("CARevisionTracker", 1);

        request.onupgradeneeded = function(event) {
            db = event.target.result;
            if (!db.objectStoreNames.contains('entries')) {
                db.createObjectStore('entries', { keyPath: 'id', autoIncrement: true });
            }
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            renderEntries();
        };

        request.onerror = function(event) {
            alert("Database error: " + event.target.errorCode);
        };

        // --- 4. Image Compression Logic ---
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1080; // Limit width to save space
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Compress to JPEG with 70% quality
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // --- 5. Save Entry to Database ---
        async function saveEntry() {
            const subject = document.getElementById('subject-select').value;
            const chapter = document.getElementById('chapter-input').value.trim();
            const qRef = document.getElementById('q-ref-input').value.trim();
            const tag = document.getElementById('tag-select').value;
            const imageFile = document.getElementById('image-input').files[0];

            if (!chapter || !qRef) {
                alert("Please fill in Chapter Name and Question Reference.");
                return;
            }

            let imageDataUrl = null;
            if (imageFile) {
                // Compress image before saving
                imageDataUrl = await compressImage(imageFile);
            }

            const newEntry = {
                subject: subject,
                chapter: chapter,
                qRef: qRef,
                tag: tag,
                image: imageDataUrl,
                timestamp: new Date().getTime()
            };

            const transaction = db.transaction(["entries"], "readwrite");
            const store = transaction.objectStore("entries");
            store.add(newEntry);

            transaction.oncomplete = function() {
                // Reset form
                document.getElementById('chapter-input').value = '';
                document.getElementById('q-ref-input').value = '';
                document.getElementById('image-input').value = '';
                alert("Entry logged successfully!");
                renderEntries();
            };
        }

        // --- 6. Render Entries and Search Filter ---
        function renderEntries() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            const lists = {
                accounting: document.getElementById('accounting-list'),
                law: document.getElementById('law-list'),
                maths: document.getElementById('maths-list'),
                eco: document.getElementById('eco-list')
            };

            // Clear current lists
            for (let key in lists) lists[key].innerHTML = '';

            const transaction = db.transaction(["entries"], "readonly");
            const store = transaction.objectStore("entries");
            const request = store.openCursor();

            request.onsuccess = function(event) {
                const cursor = event.target.result;
                if (cursor) {
                    const data = cursor.value;
                    const searchString = `${data.chapter} ${data.qRef} ${data.tag}`.toLowerCase();
                    
                    if (searchString.includes(searchQuery)) {
                        const dateString = new Date(data.timestamp).toLocaleDateString();
                        let imgHTML = data.image ? `<img src="${data.image}" class="entry-img" alt="Question Image">` : '';

                        const html = `
                            <div class="entry-card">
                                <div class="entry-header">
                                    <strong>${data.chapter}</strong>
                                    <span style="font-size: 12px; color: var(--text-muted);">${dateString}</span>
                                </div>
                                <div style="margin-bottom: 10px;">Ref: ${data.qRef}</div>
                                <span class="tag">${data.tag}</span>
                                ${imgHTML}
                                <button class="delete-btn" onclick="deleteEntry(${data.id})">Delete Entry</button>
                            </div>
                        `;
                        lists[data.subject].innerHTML += html;
                    }
                    cursor.continue();
                } else {
                    // Display message if empty
                    for (let key in lists) {
                        if (lists[key].innerHTML === '') {
                            lists[key].innerHTML = '<p style="text-align:center; color:var(--text-muted);">No entries found.</p>';
                        }
                    }
                }
            };
        }

        // --- 7. Delete Entry ---
        function deleteEntry(id) {
            if(confirm("Are you sure you want to delete this entry?")) {
                const transaction = db.transaction(["entries"], "readwrite");
                const store = transaction.objectStore("entries");
                store.delete(id);
                transaction.oncomplete = function() { renderEntries(); };
            }
        }

        // --- 8. Export Data to JSON (Backup) ---
        function exportData() {
            const transaction = db.transaction(["entries"], "readonly");
            const store = transaction.objectStore("entries");
            const request = store.getAll();

            request.onsuccess = function() {
                const dataStr = JSON.stringify(request.result);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = 'ca_revision_backup.json';

                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };
        }

        // --- 9. Import Data from JSON (Restore) ---
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    const transaction = db.transaction(["entries"], "readwrite");
                    const store = transaction.objectStore("entries");
                    
                    // Clear existing database before import to prevent duplicates
                    store.clear(); 
                    
                    data.forEach(entry => {
                        // Remove id to let autoIncrement assign new ones
                        delete entry.id; 
                        store.add(entry);
                    });

                    transaction.oncomplete = function() {
                        alert("Data restored successfully!");
                        renderEntries();
                        document.getElementById('import-file').value = ''; // reset file input
                    };
                } catch (error) {
                    alert("Error reading backup file. Make sure it is a valid JSON.");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
